<!DOCTYPE html>
<html>
<head>
<title>Book Appointment - Happy Paws</title>
<link rel="stylesheet" href="style.css">

<style>

body{
font-family: Arial;
background: rgb(242, 188, 196);
margin:0;
}

header{
background: #ff8fab;
color:white;
text-align:center;
padding:20px;
}

.appointment-box{
background:white;
width:400px;
margin:40px auto;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px #ccc;
}

input, select{
width:100%;
padding:10px;
margin:8px 0;
}

button{
background:#ff8fab;
color:white;
border:none;
padding:10px;
width:100%;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#ff8fab;
}

</style>

</head>

<body>

<header>
<h1>📅 Book Pet Doctor Appointment</h1>
</header>

<section class="appointment-box">

<h2>Appointment Details 🐾</h2>

<form onsubmit="return bookAppointment()">

<label>Owner Name</label>
<input type="text" id="name" required>

<label>Pet Name</label>
<input type="text" id="pet" required>

<label>Select Date</label>
<input type="date" id="date" required>

<label>Select Time Slot</label>

<select id="slot" required>

<option value="">Choose Time</option>

<option>09:00 AM - 10:00 AM</option>
<option>10:00 AM - 11:00 AM</option>
<option>11:00 AM - 12:00 PM</option>
<option>12:00 PM - 01:00 PM</option>
<option>02:00 PM - 03:00 PM</option>
<option>03:00 PM - 04:00 PM</option>
<option>04:00 PM - 05:00 PM</option>
<option>05:00 PM - 06:00 PM</option>

</select>

<label>Phone Number</label>
<input type="tel" id="phone" required>

<button type="submit">Confirm Appointment</button>

</form>

</section>

<script>

function bookAppointment(){

let name=document.getElementById("name").value;
let pet=document.getElementById("pet").value;
let date=document.getElementById("date").value;
let slot=document.getElementById("slot").value;

alert(
"Appointment Confirmed 🐶\n\n"+
"Owner: "+name+
"\nPet: "+pet+
"\nDate: "+date+
"\nTime: "+slot
);

return false;

}

</script>

</body>
</html>
